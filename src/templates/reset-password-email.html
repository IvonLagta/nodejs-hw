<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your password</title>
  </head>
  <body style="margin: 0; padding: 24px; font-family: Arial, sans-serif; background-color: #f7f7f8; color: #1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; border: 1px solid #e5e7eb;">
      <tr>
        <td style="padding: 24px;">
          <h1 style="margin: 0 0 16px; font-size: 22px;">Password reset request</h1>
          <p style="margin: 0 0 12px; font-size: 16px; line-height: 1.5;">Hi {{name}},</p>
          <p style="margin: 0 0 20px; font-size: 16px; line-height: 1.5;">
            We received a request to reset your password. Click the button below to create a new one.
          </p>
          <p style="margin: 0 0 20px;">
            <a href="{{resetLink}}" style="display: inline-block; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; color: #ffffff; background-color: #0f766e;">
              Reset password
            </a>
          </p>
          <p style="margin: 0 0 10px; font-size: 14px; color: #4b5563; line-height: 1.5;">
            Or use this link:
          </p>
          <p style="margin: 0 0 20px; font-size: 14px; word-break: break-all;">
            <a href="{{resetLink}}" style="color: #0f766e;">{{resetLink}}</a>
          </p>
          <p style="margin: 0; font-size: 13px; color: #6b7280; line-height: 1.5;">
            This link is valid for 15 minutes. If you did not request a password reset, please ignore this email.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
